; PlatformIO build configuration for ESP32Marauder on
; the Waveshare ESP32-S3 Touch LCD 2 board.
;
; To use:
;   1. Install PlatformIO Core (or the VS Code / CLion plugin)
;   2. From this directory: `pio run -e waveshare_esp32_s3_touch_lcd_2`
;   3. To upload: `pio run -e waveshare_esp32_s3_touch_lcd_2 -t upload`
;
; Notes:
;   - The TFT_eSPI configuration is inlined via build_flags below, mirroring
;     User_Setup_waveshare_esp32_s3_touch_lcd_2.h.  We set USER_SETUP_LOADED
;     so TFT_eSPI skips its bundled User_Setup_Select.h.
;   - upload_protocol = esp-builtin uses the on-board USB-JTAG / Serial
;     interface.  The standard serial bootloader is timing-sensitive on this
;     board and frequently fails with "Failed to connect to ESP32-S3: No
;     serial data received" — esp-builtin avoids that.
;   - If you would rather drive the Arduino IDE: see README_WAVESHARE.md for
;     the manual library install steps.

[platformio]
default_envs = waveshare_esp32_s3_touch_lcd_2

; ----------------------------------------------------------------------------
; Waveshare ESP32-S3 Touch LCD 2
;   ESP32-S3R8, 8 MB OPI PSRAM, 16 MB flash, ST7789T3 240x320 (SPI2),
;   CST816D capacitive touch (I2C), backlight on GPIO1 (LEDC PWM).
; ----------------------------------------------------------------------------
[env:waveshare_esp32_s3_touch_lcd_2]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; ---------------------------------------------------------------
; Upload port auto-detection
; ---------------------------------------------------------------
; For ESP32-S3 with the native USB-JTAG interface (esp-builtin
; protocol), PlatformIO can locate the device automatically by
; its USB VID/PID — no COM port override required.
;
; Uncomment ONE of the lines below to override the auto-detect:
;
;   ; Force a specific COM port (Windows: COM5, Linux: /dev/ttyACM0)
;   upload_port = COM5
;
;   ; Pick the first available serial port automatically
;   upload_port = ${comport.auto}
;
;   ; Or pull it from an env var: set ESP32_PORT=COM5 before pio run
;   upload_port = ${sysenv.ESP32_PORT}

upload_protocol = esp-builtin

; 16 MB flash + OPI PSRAM (matches reference firmware)
board_upload.flash_size    = 16MB
board_upload.maximum_size  = 16777216
board_build.partitions     = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type     = opi
board_build.f_flash        = 80000000L
board_build.flash_mode     = qio

build_flags =
    ; Board target — must match the define name in esp32_marauder/configs.h
    -DMARAUDER_WAVESHARE_TOUCH_LCD_2

    ; Common Arduino-ESP32 v3.x flags for S3 with PSRAM
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

    ; TFT_eSPI — bypass User_Setup_Select.h and configure inline
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=38
    -DTFT_SCLK=39
    -DTFT_CS=45
    -DTFT_DC=42
    -DTFT_RST=-1
    -DTFT_BL=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; Capacitive touch (consumed by esp32_marauder/ft6336.h)
    -DCTP_SDA=48
    -DCTP_SCL=47
    -DCTP_RST=-1
    -DTOUCH_CS=-1

lib_deps =
    ; Display
    bodmer/TFT_eSPI@^2.5.43

    ; Web UI / captive portal (Marauder has a settings webserver)
    ; esp32async is the actively maintained fork of Me-No-Dev's
    ; ESPAsyncWebServer (Me-No-Dev repo is archived; lennarthennigs/...
    ; was withdrawn from the PIO registry; mathieucarbou/... exists on
    ; GitHub but is NOT published to the PIO registry).  Pair with
    ; esp32async/AsyncTCP from the same maintainer for ABI compat.
    esp32async/ESPAsyncWebServer@^3.0.0
    esp32async/AsyncTCP

    ; Data structures / protocols
    ; NB: ivanseidel/LinkedList exists in PIO registry but only at
    ; 0.0.0-alpha from 2019 — ^1.3.0 doesn't satisfy that.  Use the
    ; active fork (vortigont), which is API-compatible and at 1.5.0.
    vortigont/LinkedList@^1.5.0
    bblanchon/ArduinoJson@^7.0.0
    marian-craciunescu/ESP32Ping@^1.0

    ; Bluetooth — Marauder uses NimBLE (not the legacy BLE library).
    ; NB: h2zero/NimBLE-Arduino 1.4.x is no longer in the PIO registry;
    ; only 2.5.0+ is published.  If Marauder breaks on 2.x we'll need
    ; to vendor a local copy.
    h2zero/NimBLE-Arduino@^2.0.0

    ; GPS NMEA parser (consumed by src/GpsInterface.h).  Even though
    ; HAS_GPS is off on this board, GpsInterface.cpp still includes
    ; MicroNMEA.h so we have to link the library.
    ; NB: original repo lives at github.com/mikalhart/MicroNMEA, but
    ; the package was published to the PIO registry under
    ; stevemarple/MicroNMEA (maintainer pickup; current v2.0.6).
    stevemarple/MicroNMEA

    ; SoftwareSerial for ESP32.  Marauder unconditionally
    ;   #include <SoftwareSerial.h>
    ; in src/GpsInterface.h:7, but the ESP32 Arduino framework doesn't
    ; ship SoftwareSerial (it exists only for AVR).  plerup's fork
    ; provides a drop-in replacement that exposes the SAME header name
    ; (SoftwareSerial.h), so no Marauder source change is needed.
    ; Verified via https://api.github.com/repos/plerup/EspSoftwareSerial/contents/src
    ; -> contains both SoftwareSerial.cpp and SoftwareSerial.h.
    plerup/EspSoftwareSerial@^8.2.0
