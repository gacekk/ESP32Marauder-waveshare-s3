; Minimal diagnostic sketch for Waveshare ESP32-S3 Touch LCD 2.
; Independent of Marauder — uses the same PIO framework / board / pinout
; but a single tiny .cpp with no library code paths.
;
; Usage from repo root:
;   cd diag
;   pio run -t upload --upload-port COM5
;   pio device monitor -p COM5 -b 115200
[env:diag]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool

board_upload.flash_size    = 16MB
board_upload.maximum_size  = 16777216
board_build.partitions     = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type     = opi
board_build.f_flash        = 80000000L
board_build.flash_mode     = qio

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

    ; TFT_eSPI inline (same as Marauder env)
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=38
    -DTFT_SCLK=39
    -DTFT_CS=45
    -DTFT_DC=42
    -DTFT_RST=-1
    -DTFT_BL=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
